<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="620" viewBox="0 0 1600 620">
  <defs>
    <linearGradient id="edge" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#303640"/>
      <stop offset="0.10" stop-color="#171b21"/>
      <stop offset="0.84" stop-color="#080a0d"/>
      <stop offset="1" stop-color="#1c2027"/>
    </linearGradient>
    <linearGradient id="rim" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#737b87" stop-opacity="0.72"/>
      <stop offset="0.25" stop-color="#2d333c" stop-opacity="0.35"/>
