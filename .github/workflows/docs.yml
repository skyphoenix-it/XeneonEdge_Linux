name: Docs

# Runs ONLY when documentation changes — the one CI concern docs edits have.
# Everything else deliberately ignores docs (see ci.yml paths-ignore).
on:
  push:
    branches: [master]
    paths: ['docs/**', '**.md']
  workflow_dispatch:

jobs:
  links:
    name: Docs & Links
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Check relative links and image paths resolve
        run: |
          set -e
          fail=0
          while IFS= read -r f; do
            dir=$(dirname "$f")
            for p in $(grep -oE '\]\(([^)#http][^)]*)\)' "$f" | sed -E 's/\]\(([^)]*)\)/\1/'); do
              [ -e "$dir/$p" ] || [ -e "$p" ] || { echo "BROKEN in $f: $p"; fail=1; }
            done
          done < <(find README.md docs -name '*.md' 2>/dev/null)
          exit $fail
